<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      th:attr="data-theme=${theme ?: 'light'}">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="color-scheme" content="light dark"/>
  <title layout:title-pattern="$CONTENT_TITLE — BuddyAI Agent">BuddyAI Agent</title>
  <link rel="stylesheet" th:href="@{/static/css/main.css}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>"/>
  <th:block layout:fragment="head"></th:block>
</head>
<body>

<div class="app-shell">

  <!-- ===================== SIDEBAR ===================== -->
  <aside class="sidebar">
    <a class="sidebar-brand" th:href="@{/ui/dashboard}">
      <span style="font-size:22px;line-height:1">🤖</span>
      <span>BuddyAI Agent</span>
    </a>

    <nav class="sidebar-nav">

      <div class="nav-section-label">Overview</div>
      <a class="nav-item" th:href="@{/ui/dashboard}">
        <i class="bi bi-grid-1x2-fill"></i>
        Dashboard
      </a>
      <a class="nav-item" th:href="@{/ui/playground}">
        <i class="bi bi-chat-dots-fill"></i>
        Playground
      </a>

      <div class="nav-section-label">Configuration</div>
      <a class="nav-item" th:href="@{/ui/services}">
        <i class="bi bi-plug-fill"></i>
        API Services
      </a>
      <a class="nav-item" th:href="@{/ui/databases}">
        <i class="bi bi-database-fill"></i>
        Databases
      </a>
      <a class="nav-item" th:href="@{/ui/documents}">
        <i class="bi bi-file-earmark-text-fill"></i>
        Documents
      </a>

      <div class="nav-section-label">Monitoring</div>
      <a class="nav-item" th:href="@{/ui/sessions}">
        <i class="bi bi-people-fill"></i>
        Sessions
      </a>
      <a class="nav-item" th:href="@{/ui/logs}">
        <i class="bi bi-list-ul"></i>
        Audit Logs
      </a>
      <a class="nav-item" th:href="@{/ui/memory}">
        <i class="bi bi-cpu-fill"></i>
        Memory
      </a>

      <div class="nav-section-label">System</div>
      <a class="nav-item" th:href="@{/ui/settings}">
        <i class="bi bi-gear-fill"></i>
        Settings
      </a>
      <a class="nav-item" href="/manage/health" target="_blank" rel="noopener">
        <i class="bi bi-heart-pulse-fill"></i>
        Health
        <i class="bi bi-box-arrow-up-right" style="font-size:10px;margin-left:auto;opacity:.5"></i>
      </a>

    </nav>

    <div class="sidebar-footer" style="padding:14px 16px;border-top:1px solid var(--color-border);flex-shrink:0">
      <div style="font-size:var(--text-xs);color:var(--color-text-muted);display:flex;align-items:center;gap:6px">
        <i class="bi bi-circle-fill" style="font-size:7px;color:var(--color-success)"></i>
        BuddyAI Agent
        <span th:text="${appVersion ?: 'v1.0.0'}" style="opacity:.6">v1.0.0</span>
      </div>
    </div>
  </aside>

  <!-- ===================== MAIN ===================== -->
  <div class="main-content">

    <!-- Top bar -->
    <header class="top-bar">
      <div style="display:flex;align-items:center;gap:12px">
        <button class="btn btn-ghost btn-icon" onclick="toggleSidebar()" id="sidebar-toggle"
                style="display:none" title="Toggle sidebar" type="button">
          <i class="bi bi-list" style="font-size:18px"></i>
        </button>

        <div layout:fragment="breadcrumb">
          <div class="breadcrumb">
            <a href="/ui/dashboard"><i class="bi bi-house"></i></a>
          </div>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:6px">
        <button class="btn btn-ghost btn-icon" id="theme-toggle" onclick="toggleTheme()"
                title="Toggle light/dark mode" type="button">
          <i class="bi bi-moon"></i>
        </button>

        <div style="width:1px;height:20px;background:var(--color-border);margin:0 2px"></div>

        <div style="display:flex;align-items:center;gap:8px;padding:4px 10px;border-radius:var(--radius-full);background:var(--color-surface-2);border:1px solid var(--color-border)">
          <div style="width:26px;height:26px;border-radius:50%;background:var(--color-primary);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;flex-shrink:0">A</div>
          <span style="font-size:var(--text-sm);font-weight:500;color:var(--color-text)" th:text="${clientId ?: 'Admin'}">Admin</span>
        </div>
      </div>
    </header>

    <!-- Page content -->
    <main class="page-content">

      <!-- Flash messages -->
      <div th:if="${successMsg}" class="alert alert-success" style="margin-bottom:16px">
        <i class="bi bi-check-circle-fill"></i>
        <span th:text="${successMsg}"></span>
      </div>
      <div th:if="${errorMsg}" class="alert alert-danger" style="margin-bottom:16px">
        <i class="bi bi-x-circle-fill"></i>
        <span th:text="${errorMsg}"></span>
      </div>
      <div th:if="${warningMsg}" class="alert alert-warning" style="margin-bottom:16px">
        <i class="bi bi-exclamation-triangle-fill"></i>
        <span th:text="${warningMsg}"></span>
      </div>

      <div layout:fragment="content">
        <!-- Page content goes here -->
      </div>

    </main>

  </div><!-- /.main-content -->
</div><!-- /.app-shell -->

<script th:src="@{/static/js/app.js}"></script>
<th:block layout:fragment="scripts"></th:block>
</body>
</html>
