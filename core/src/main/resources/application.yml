server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

spring:
  application:
    name: buddy-chat-agent

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/buddyai}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL:update}
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-sonnet-4-6
          max-tokens: 4096
          temperature: 0.7

    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

    mcp:
      client:
        connections:
          api-mcp-server:
            url: ${API_MCP_URL:http://localhost:8081}
            transport: http
          document-mcp-server:
            url: ${DOCUMENT_MCP_URL:http://localhost:8082}
            transport: http
          database-mcp-server:
            url: ${DATABASE_MCP_URL:http://localhost:8083}
            transport: http
          memory-mcp-server:
            url: ${MEMORY_MCP_URL:http://localhost:8085}
            transport: http
          notification-mcp-server:
            url: ${NOTIFICATION_MCP_URL:http://localhost:8086}
            transport: http

management:
  endpoints:
    web:
      base-path: /manage
      exposure:
        include: health,info,prometheus,metrics,loggers
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

logging:
  level:
    com.buddyai: ${LOG_LEVEL:INFO}
    org.springframework.ai: INFO
