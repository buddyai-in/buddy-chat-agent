version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: buddyai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s

  api-mcp-server:
    build: ./mcp-servers/api-mcp-server
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/buddyai
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  document-mcp-server:
    build: ./mcp-servers/document-mcp-server
    ports:
      - "8082:8082"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/buddyai
      DB_USER: postgres
      DB_PASSWORD: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  database-mcp-server:
    build: ./mcp-servers/database-mcp-server
    ports:
      - "8083:8083"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/buddyai
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  memory-mcp-server:
    build: ./mcp-servers/memory-mcp-server
    ports:
      - "8085:8085"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/buddyai
      DB_USER: postgres
      DB_PASSWORD: postgres
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy

  notification-mcp-server:
    build: ./mcp-servers/notification-mcp-server
    ports:
      - "8086:8086"
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:}
      SPRING_MAIL_HOST: ${SMTP_HOST:smtp.gmail.com}
      SPRING_MAIL_USERNAME: ${SMTP_USER:}
      SPRING_MAIL_PASSWORD: ${SMTP_PASS:}
    depends_on:
      postgres:
        condition: service_healthy

  buddy-chat-agent:
    build: ./core
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/buddyai
      DB_USER: postgres
      DB_PASSWORD: postgres
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY:}
      API_MCP_URL: http://api-mcp-server:8081
      DOCUMENT_MCP_URL: http://document-mcp-server:8082
      DATABASE_MCP_URL: http://database-mcp-server:8083
      MEMORY_MCP_URL: http://memory-mcp-server:8085
      NOTIFICATION_MCP_URL: http://notification-mcp-server:8086
    depends_on:
      postgres:
        condition: service_healthy
      api-mcp-server:
        condition: service_started
      document-mcp-server:
        condition: service_started
      database-mcp-server:
        condition: service_started
      memory-mcp-server:
        condition: service_started
      notification-mcp-server:
        condition: service_started

volumes:
  postgres_data:
